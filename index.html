<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Curriculum vitae online." />
  <title>CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>

  <header class="hero" id="hero">
    <p class="hero-kicker" id="hero-kicker">Curriculum Vitae</p>
    <h1 id="hero-name"></h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <ul class="contact-list" id="contact-list" aria-label="Información de contacto"></ul>
  </header>

  <main class="cv-wrapper" id="cv-wrapper">
    <section class="card reveal">
      <h2>Perfil Profesional</h2>
      <p id="profile-text"></p>
    </section>

    <section class="card reveal" id="experience-section">
      <h2>Experiencia</h2>
    </section>

    <section class="card reveal" id="education-section">
      <h2>Educación</h2>
    </section>

    <section class="card reveal two-cols">
      <div>
        <h2>Habilidades Técnicas</h2>
        <ul class="tags" id="skills-list"></ul>
      </div>
      <div>
        <h2>Idiomas</h2>
        <ul id="languages-list"></ul>
      </div>
    </section>

    <section class="card reveal" id="projects-section">
      <h2>Proyectos Destacados</h2>
    </section>
  </main>

  <footer>
    <p id="availability-text"></p>
    <p>&copy; <span id="year"></span> <span id="footer-name"></span></p>
  </footer>

  <noscript>Necesitas activar JavaScript para ver el contenido del CV.</noscript>
  <script src="app.js" defer></script>
</body>
</html>
